services:
  - type: web
    name: hr-attrition-api
    env: python
    region: oregon
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./mlapp.db
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false   # Set this manually in Render dashboard to your Vercel URL
